<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .loder{
            margin: auto;
            margin-top: 40vh;
            height: 100px;
            width: 100px;
            border: #ddd 6px solid;
            border-radius: 50%;
            border-top: #333 solid 6px;
            animation: rotate 1s infinite ;


        }
        @keyframes rotate{
            100%{
              rotate: 360deg;
            }
        }
    </style>
</head>
<body>

    <div class="loder"></div>
    
</body>
</html>
