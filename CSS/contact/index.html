<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        main{
            width: 100%;
            height: 100vh;
            padding: 30px 60px;
        }
        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;  
        }
        .tagline{
            margin-top: 30px;
            margin-bottom: 50px;
        }
        input{
            height: 30px;
            border: 1px solid ;
        }
        textarea{
            width: 100%;
            height: 15vh;
        }
        button{
            padding: 5px 20px;
            color: white;
            background-color: blueviolet;
            border-radius: 5px;
            border: none;
        }
        hr{
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .mail{
            margin-bottom:20px ;
            color: blueviolet;
        }
        .sn{
           margin-bottom: 5px;
        }
        input, textarea{
            background-color: rgb(243, 242, 242);
        }
        label{
            display: inline-block;
            text-align: left;
        }
    </style>
 
</head>
<body>
    <main>
        <div class="container">
            <h1>Contact Us</h1>
            <p class="tagline">Whatever Cardigan tote bag tambit hexagon brooklyn assymentrical gentrify</p>
            <form action="">
                <div >
                <label for="name">Name</label>
                <input type="text" id="name">
                <label for="email">Email</label>
                <input type="email" id="email">
                </div>
                <br>
                <label style="width: 100%; text-align: left;" for="msg">Message</label>
                <textarea name="" id="msg"></textarea>
                <br>
                <button>Button</button>

                <hr width="100%">

                <p class="mail">exhample@gmail.com</p>
                <p class="sn">49 nsmith sd</p>
                <p>Saint Cloud , MN 56301</p>
            </form>
        </div>

    </main>
    
</body>
</html>
